<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>좌석 배치 현황 — AttendMate</title>
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/seatmap.css">
</head>
<body>

<nav class="global-nav">
  <a href="index.html" class="text-nav-link" style="font-weight:600;">AttendMate</a>
  <div class="global-nav__links">
    <a href="index.html">홈</a>
    <a href="seats.html">좌석 현황</a>
    <a href="scan.html">QR 체크인</a>
  </div>
  <div class="global-nav__actions">
    <button id="refreshBtn" class="btn-dark-utility">새로고침</button>
  </div>
</nav>

<div class="sub-nav-frosted">
  <span class="sub-nav-frosted__title">좌석 배치 현황</span>
  <div class="sub-nav-frosted__links">
    <span id="lastUpdated" class="text-caption on-light"></span>
  </div>
</div>

<div id="timeTabs" class="time-tabs"></div>

<div id="seatMap"></div>

<div id="assignModal" class="modal-overlay" style="display:none;">
  <div class="modal-panel">
    <h3 class="text-body-strong on-light" id="assignModalTitle">좌석 배정</h3>
    <input id="assignSearchInput" class="search-input" style="width:100%;" type="text" placeholder="이름, 회원ID, 학년반 검색">
    <div id="assignResults" class="modal-panel__results"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="assignCancelBtn" class="btn-secondary-pill">취소</button>
    </div>
  </div>
</div>

<div id="occupantModal" class="modal-overlay" style="display:none;">
  <div class="modal-panel">
    <h3 class="text-body-strong on-light" id="occupantModalText"></h3>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="occupantCloseBtn" class="btn-primary">확인</button>
    </div>
  </div>
</div>

<script type="module" src="assets/js/seats.js"></script>
</body>
</html>
