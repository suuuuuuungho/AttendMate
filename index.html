<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>좌석 배치 현황 — AttendMate</title>
    <meta name="description" content="AttendMate 좌석 배치 현황 및 출석 체크" />
    <link rel="stylesheet" href="assets/css/tokens.css?v=20260704g" />
    <link rel="stylesheet" href="assets/css/base.css?v=20260704g" />
    <link rel="stylesheet" href="assets/css/components.css?v=20260704g" />
    <link rel="stylesheet" href="assets/css/seatmap.css?v=20260704g" />
  </head>
  <body>
    <nav class="global-nav">
      <div class="app-switcher">
        <button id="appSwitcherBtn" type="button" class="app-switcher__trigger">
          <span class="text-nav-link" style="font-weight: 600">AttendMate</span>
          <svg
            class="app-switcher__chevron"
            width="12"
            height="12"
            viewBox="0 0 16 16"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M4 6l4 4 4-4"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <div id="appSwitcherMenu" class="app-switcher__menu" style="display: none">
          <span class="app-switcher__item app-switcher__item--current"
            >좌석 배치 현황</span
          >
          <a
            class="app-switcher__item"
            href="https://suuuuuuungho.github.io/AttendMate_Stat/"
            >출석 통계</a
          >
          <a
            class="app-switcher__item"
            href="https://suuuuuuungho.github.io/AttendMate_Admin/"
            >관리자</a
          >
        </div>
      </div>
      <div class="global-nav__actions">
        <span
          id="lastUpdated"
          class="text-caption"
          style="opacity: 0.85"
        ></span>
        <button id="refreshBtn" class="btn-dark-utility">새로고침</button>
      </div>
    </nav>

    <div class="sub-nav-frosted">
      <span class="sub-nav-frosted__title">좌석 배치 현황</span>
      <div class="sub-nav-frosted__links">
        <div id="timeTabs" class="time-tabs"></div>
      </div>
    </div>

    <div class="sticky-toolbar">
      <div id="gradeLegend" class="grade-legend"></div>

      <div class="filter-and-search">
        <select
          id="filterSelect"
          class="time-select filter-select"
          title="학년/반 필터"
        ></select>
        <div class="locate-search">
          <input
            id="locateSearchInput"
            class="search-input"
            style="width: 100%"
            type="text"
            placeholder="학생 위치 찾기(이름 검색)"
          />
          <div
            id="locateResults"
            class="locate-search__results"
            style="display: none"
          ></div>
        </div>
      </div>
    </div>

    <div id="seatMap"></div>

    <section
      id="unassignedSection"
      class="unassigned-section"
      style="display: none"
    >
      <h2 class="unassigned-section__title text-body-strong on-light">
        출석했지만 자리는 미배정된 학생들
      </h2>
      <div id="unassignedGroups" class="unassigned-groups"></div>
    </section>

    <div id="assignModal" class="modal-overlay" style="display: none">
      <div class="modal-panel">
        <h3 class="text-body-strong on-light" id="assignModalTitle">
          좌석 배정
        </h3>
        <input
          id="assignSearchInput"
          class="search-input"
          style="width: 100%"
          type="text"
          placeholder="이름, 회원ID, 학년반 검색"
        />
        <div id="assignResults" class="modal-panel__results"></div>
        <div style="display: flex; gap: 8px; justify-content: flex-end">
          <button id="assignCancelBtn" class="btn-secondary-pill">취소</button>
        </div>
      </div>
    </div>

    <div id="occupantModal" class="modal-overlay" style="display: none">
      <div class="modal-panel">
        <h3 class="text-body-strong on-light" id="occupantModalText"></h3>
        <button id="occupantMoveBtn" class="btn-primary" style="width: 100%">
          자리 이동
        </button>
        <button
          id="occupantCancelCheckinBtn"
          class="btn-secondary-pill"
          style="width: 100%"
        >
          체크인 취소
        </button>
        <button
          id="occupantCloseBtn"
          class="btn-secondary-pill"
          style="
            width: 100%;
            border-color: var(--color-hairline);
            color: var(--color-ink-muted-80);
          "
        >
          닫기
        </button>
      </div>
    </div>

    <div id="moveBanner" class="move-banner" style="display: none">
      <span id="moveBannerText" class="text-caption"></span>
      <button id="moveCancelBtn" type="button" class="move-banner__cancel">
        취소
      </button>
    </div>

    <script type="module" src="assets/js/seats.js?v=20260704g"></script>
  </body>
</html>
