<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 체크인 — AttendMate</title>
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/seatmap.css">
<style>
  #qr-reader { max-width: 480px; margin: 0 auto; padding: var(--space-lg); }
  #scanStatus { text-align: center; }
</style>
</head>
<body>

<nav class="global-nav">
  <a href="index.html" class="text-nav-link" style="font-weight:600;">AttendMate</a>
  <div class="global-nav__links">
    <a href="index.html">홈</a>
    <a href="seats.html">좌석 현황</a>
    <a href="scan.html">QR 체크인</a>
  </div>
</nav>

<div class="sub-nav-frosted">
  <span class="sub-nav-frosted__title">QR 체크인</span>
</div>

<div id="timeTabs" class="time-tabs"></div>

<p id="scanStatus" class="text-body on-light" style="margin-top:var(--space-sm);">QR 코드를 카메라에 비춰주세요</p>
<div id="qr-reader"></div>

<div id="scanOverlay" class="modal-overlay" style="display:none;">
  <div class="modal-panel" style="max-width:900px;">
    <h3 id="scanMemberInfo" class="text-display-lg on-light" style="font-size:24px;"></h3>
    <p class="text-caption on-light">좌석을 선택하면 체크인됩니다.</p>
    <div id="scanSeatMap" style="max-height:60vh; overflow-y:auto;"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="scanCancelBtn" class="btn-secondary-pill">취소</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script type="module" src="assets/js/scan.js"></script>
</body>
</html>
